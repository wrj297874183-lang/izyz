<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册志愿者信息</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      min-height: 100vh;
    }

    /* ── Header ── */
    .card-header {
      background: #3a3a3a;
      color: #fff;
      text-align: center;
      font-size: 17px;
      font-weight: 600;
      padding: 14px 0;
      letter-spacing: 1px;
    }

    /* ── Logo banner ── */
    .logo-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #fafafa;
      border-bottom: 1px solid #e8e8e8;
    }

    .logo-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* SVG volunteer logo */
    .logo-icon {
      width: 80px;
      height: 68px;
      display: block;
      mix-blend-mode: multiply;
    }

    .logo-right {
      text-align: right;
    }

    .logo-right .slogan-zh {
      font-size: 16px;
      font-weight: 700;
      color: #222;
      letter-spacing: 1px;
    }

    .logo-right .slogan-en {
      font-size: 12px;
      color: #888;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    /* ── Info rows ── */
    .info-list {
      background: #fff;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 18px;
      border-bottom: 1px solid #ececec;
      background: #fff;
    }

    .info-row:nth-child(even) {
      background: #f7f7f7;
    }

    .row-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #888;
      font-size: 15px;
    }

    .row-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      color: #aaa;
    }

    .row-label {
      color: #666;
      font-size: 15px;
    }

    .row-value {
      font-size: 15px;
      color: #222;
      font-weight: 500;
      text-align: right;
      max-width: 55%;
    }

    /* ── Footer note ── */
    .card-footer {
      padding: 18px 18px 30px;
      font-size: 13px;
      color: #aaa;
      background: #fafafa;
    }

    .card-footer .note-label {
      color: #e03030;
      font-weight: 600;
    }

    /* ── Divider between logo section and rows ── */
    .section-divider {
      height: 8px;
      background: #f0f0f0;
    }
  </style>
</head>
